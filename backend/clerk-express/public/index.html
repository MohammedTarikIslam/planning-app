<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/css/main.css" />
  <script
    defer
    crossorigin="anonymous"
    src="https://capable-mosquito-18.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js"
    type="text/javascript">
  </script>

  <script
    defer
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_Y2FwYWJsZS1tb3NxdWl0by0xOC5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://capable-mosquito-18.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
    type="text/javascript">
  </script>

  <title>Holiday Planning App</title>
</head>
<body>
  <!-- Clerk Auth -->
  <div id="app" class="auth-page"></div>
  <div id="app-content" style="display:none;">
    <div id="user-button-slot"></div>
    <header>
      <div class="header-main">
      <h1 class="app-title">PLANNING APP</h1>
      <button class="save-button" onclick="saveData()">Save</button>
    </div>
  </header>

  <section class="all-cards"> 
    <div class="card cost">
      <h2 class="card__title">Cost</h2>
      
      <div class="cost-section">
        <label for="number-of-people">Number of people: <br></label>
        <input type="number" id="number-of-people" value="1" min="1">
      </div>

      <div class="cost-section">
        <label for="cost-hotel">Hotel cost:<br></label>
        <input type="number" id="cost-hotel" value="0">
      </div>

      <div class="cost-section">
        <label for="cost-flight">Flight cost:<br></label>
        <input type="number" id="cost-flight" value="0">
      </div>

      <div class="cost-section">
        <label for="cost-activities">Activities cost:<br></label>
        <input type="number" id="cost-activities" value="0">
      </div>

      <div class="cost__sum">
        <div class="cost-section">
          <strong for="cost-total"> <br> Total cost:</strong>
          <span id="total">0.00</span>
        </div>
        
        <div class="cost-section">
          <strong for="cost-split"> <br>Split cost:</strong>
          <span id="split">0.00</span>
        </div>
      </div>
    </div>

    <div class="card flights">
      <h2 class="card__title">Flights</h2>
      <div class="flights__details">
        <div class="departure-information">
          <label for="departure-reference">Departure Flight Reference:</label>
          <input type="text" id="departure-reference" placeholder="Enter departure flight reference">
        </div>
        <div class="departure-information">
          <label for="flight-date">Departure flight:</label>
          <input type="date" id="flight-date">
          <input type="time" id="flight-time">
        </div>
      </div>
      
      <div class="flights__information">
        <div class="return-information">
          <label for="return-reference">Return Flight Reference:</label>
          <input type="text" id="return-reference" placeholder="Enter return flight reference">
        </div>
        <div class="return-information">
          <label for="return-date">Return flight:</label>
          <input type="date" id="return-date"> 
          <input type="time" id="return-time">
        </div>
      </div>
      <div class="flights__description">
          <p contenteditable="true" id="flights-description" data-placeholder="Enter the flights details"></p>
      </div>
    </div>

    <div class="card hotels">
      <h2 class="card__title">Hotels</h2>
      <label for="hotel-name">Hotel name:</label>
      <input type="text" id="hotel-name" placeholder="Enter hotel name">
      <div class="hotels__information">
        <div class="hotel-check-in">
          <label for="check-in-date">Check-in date:</label>
          <input type="date" id="check-in-date">
        </div>
        <div class="hotel-check-out">
          <label for="check-out-date">Check-out date:</label>
          <input type="date" id="check-out-date">
        </div>
      </div>
      <p contenteditable="true" id="hotel-description" data-placeholder="Enter the hotel details"></p>
    </div>

    <div class="card food">
      <h2 class="card__title">Food</h2>
      <p contenteditable="true" id="food-description" data-placeholder="Enter the food details"></p>
    </div>

    <div class="card activities">
      <h2 class="card__title">Activities</h2>
      <p contenteditable="true" id="activities-description" data-placeholder="Enter the activities details"></p>
    </div>

    <div class="card weather">
      <h2 class="card__title">Weather</h2>
      <label for="location">Location:</label>
      <input type="text" id="location" placeholder="Enter destination">
      <p id="weather-status">Enter location and dates</p>
      <div id="weather-output"></div>
    </div>

  </section>
  <script src="script.js"></script>
  </div>
</body>

</html>
