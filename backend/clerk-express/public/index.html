<body>
  <div id="app"></div>
  <div id="app-content" style="display:none;">
  <header>
    <h1 class="intro">PLANNING APP  </h1>
    <button class="savebutton" onclick="saveData()">Save</button>
  </header>

  <section class="allcards"> 

    <div class="card cost">
      <h2 class="card__title">Cost</h2>
      
      <div class="sectioned-cost">
        <label for="numberofpeople">Number of people:</label>
        <input type="number" id="numberofpeople" value="1" min="1">
      </div>

      <div class="sectioned-cost">
        <label for="accommodationcost">Accommodation cost:</label>
        <input type="number" id="accommodationcost" value="0">
      </div>

      <div class="sectioned-cost">
        <label for="travelcost">Travel cost:</label>
        <input type="number" id="travelcost" value="0">
      </div>

      <div class="sectioned-cost">
        <label for="activitiescost">Activities cost:</label>
        <input type="number" id="activitiescost" value="0">
      </div>

      <div class="cost__sum">
        <div class="sectioned-cost">
          <strong for="totalcost"> <br> Total cost:</strong>
          <span id="total">0.00</span>
        </div>
        
        <div class="sectioned-cost">
          <strong for="splitcost"> <br>Split cost:</strong>
          <span id="split">0.00</span>
        </div>
      </div>
    
    </div>

    <!-- <div class="card split">
      <h2 class="card__title">Per Person Split </h2>
      <p class="card__description">
        person 1: $100 <br>
        person 2: $100 <br> 
        person 3: $100 <br>
      </p>
    </div>  -->

    <div class="card flights">
      <h2 class="card__title">Flights</h2>
      <div class="flights__details">
        <p contenteditable="true" id="traveldesc" data-placeholder="Enter the travel details"></p>
      </div>
    </div>

    <div class="card hotels">
      <h2 class="card__title">Hotels</h2>
      <p contenteditable="true" id="hoteldesc" data-placeholder="Enter the hotel details"></p>
    </div>

    <div class="card food">
      <h2 class="card__title">Food</h2>
      <p contenteditable="true" id="fooddesc" data-placeholder="Enter the food details"></p>
    </div>

    <div class="card activities">
      <h2 class="card__title">Activities</h2>
      <p contenteditable="true" id="activitiesdesc" data-placeholder="Enter the activities details"></p>
    </div>
      
    <div class="card test">
      <h2 class="card__title">text input test</h2>
      <p contenteditable="true" id="test" data-placeholder="Click here to enter text"></p>
    </div>

  </section>
